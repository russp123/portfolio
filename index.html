<script>
  // Runs synchronously, before anything paints — sets the theme
  // attribute immediately so the browser never has a chance to paint
  // CSS's dark :root defaults first. Without this, a saved "light"
  // preference would flash dark for a frame on every load (theme.js,
  // which runs later, would be too late to prevent that).
  document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "light");
  // Intro gate — decided here, pre-paint, so the overlay covers the page
  // from the very first frame (no homepage flash) and repeat visitors
  // never even see the overlay element. Once per browser session;
  // reduced-motion users skip it entirely.
  try {
    if (!sessionStorage.getItem("introPlayed") && !matchMedia("(prefers-reduced-motion: reduce)").matches) {
      document.documentElement.setAttribute("data-intro", "1");
    }
  } catch (e) {}
</script>

      <section class="what-i-do">

  <script src="https://unpkg.com/lenis@1.3.25/dist/lenis.min.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // ---- Reload intro: testimonials fast-stream ------------------
      // Cards sweep across the blank overlay in overlapping succession
      // (in from one side, a beat near center, out the other side),
      // alternating directions. ~2.5s total; any input skips it.
      const introOverlay = document.getElementById("intro-overlay");
      if (introOverlay && document.documentElement.getAttribute("data-intro") === "1" && Array.isArray(PORTFOLIO.testimonials) && PORTFOLIO.testimonials.length) {
        const introCards = PORTFOLIO.testimonials.slice(0, 5);
        introOverlay.innerHTML =
          `<div class="intro-label">What people say</div>` +
          introCards
            .map(
              (t, i) => `<figure class="intro-card" style="animation-delay:${i * 1050}ms">
                <blockquote>${t.quote}</blockquote>
                <figcaption><span>${t.name}</span><span>${t.role}</span></figcaption>
              </figure>`
            )
            .join("");
        const introTotal = (introCards.length - 1) * 1050 + 1650;
        let introDone = false;
        const finishIntro = () => {
          if (introDone) return;
          introDone = true;
          try { sessionStorage.setItem("introPlayed", "1"); } catch (e) {}
          introOverlay.classList.add("intro-done");
          setTimeout(() => {
            introOverlay.remove();
            document.documentElement.removeAttribute("data-intro");
          }, 450);
          ["click", "keydown", "wheel", "touchstart"].forEach((ev) => window.removeEventListener(ev, finishIntro));
        };
        ["click", "keydown", "wheel", "touchstart"].forEach((ev) => window.addEventListener(ev, finishIntro, { passive: true }));
        setTimeout(finishIntro, introTotal);
      } else if (introOverlay) {
        introOverlay.remove();
      }

      // ---- Hero: email chip -----------------------------------------
      // mailto: gets the site-wide copy-to-clipboard + toast behavior
      // from theme.js (initMailtoCopy) for free.
      const heroEmail = document.getElementById("hero-email");
      if (heroEmail) {
        heroEmail.href = "mailto:" + PORTFOLIO.email;
        heroEmail.innerHTML = `${PORTFOLIO.email}<sup>↗</sup>`;
      }

      // ---- Hero: cylindrical infinite carousel ----------------------
      // The real 3D version: every project cover/video is a flat plane
      // placed on the inside wall of a cylinder (rotateY around a
      // shared axis + CSS perspective on the container). The whole
      // wall rotates as ONE rigid surface — cards never tilt or move
      // individually, the warp comes entirely from the cylinder's
      // curvature: vertical edges foreshorten and the strip's top and
      // bottom edges bow toward the viewport edges. Because the N
      // cards close the full 360°, the rotation loops seamlessly with
      // no duplicated set. Cards are real links to their project pages.
      const heroTrack = document.getElementById("hero-carousel-track");
      const heroCarousel = document.getElementById("hero-carousel");
      if (heroTrack && heroCarousel) {
        const coverUrl = (p) => ((p.cover || "").match(/url\(['"]?([^'")]+)/) || [])[1] || "";
        const items = PORTFOLIO.projects.filter((p) => p.cover || p.video);
        heroTrack.innerHTML = items
          .map(
            (p) => `<a class="hero-card" href="${p.page}" aria-label="${p.title}"${p.cover ? ` style="background-image:${p.cover}"` : ""}>
              ${p.video ? `<video class="hero-card-media" src="${p.video}" autoplay muted loop playsinline preload="metadata"${coverUrl(p) ? ` poster="${coverUrl(p)}"` : ""}></video>` : ""}
              <span class="hero-card-label">${p.title}</span>
            </a>`
          )
          .join("");
        const heroCards = Array.from(heroTrack.children);

        const N = heroCards.length;
        const ANGLE = 360 / N;   // deg between neighboring cards — closes the cylinder
        const GAP = 14;          // px between cards along the wall
        const RATIO = 1.25;      // card height : width (reference's near-square shape)
        const reducedMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
        let R = 0;               // cylinder radius, from card width + gap
        let base = 0;            // current wall rotation, deg
        let cruiseSpeed = 2;     // deg/s equivalent of ~30px/s, set by size()
        let speed = 0;
        let targetSpeed = 0;
        let hovered = false;
        let lastT = 0;

        // Card size from the reference's proportions: ~4.3 cards across
        // on desktop (~2.2 on phones). Deliberately NOT capped by the
        // viewport height — the reference gives the wall its full size
        // and lets it run past the fold on shorter screens.
        const size = () => {
          const vw = window.innerWidth;
          const visible = vw < 700 ? 2.2 : 4.3;
          const w = vw / visible;
          const h = w * RATIO;
          R = (w + GAP) / (2 * Math.tan(((ANGLE / 2) * Math.PI) / 180));
          heroCarousel.style.setProperty("--hc-w", w.toFixed(1) + "px");
          heroCarousel.style.setProperty("--hc-h", h.toFixed(1) + "px");
          // Viewer distance sets how strong the warp reads; ~2x the
          // radius keeps it gentle like the reference.
          heroCarousel.style.perspective = Math.round(R * 2.2) + "px";
          // Match the drift to a steady ~30px/s along the wall
          // regardless of how big the cylinder came out.
          cruiseSpeed = 30 / ((R * Math.PI) / 180);
          if (!hovered) targetSpeed = cruiseSpeed;
        };

        const layout = () => {
          heroCards.forEach((card, i) => {
            // This card's angle around the cylinder, normalized to
            // (-180, 180] so 0 is dead-center of the viewport.
            let phi = (((base - i * ANGLE) % 360) + 360) % 360;
            if (phi > 180) phi -= 360;
            // Anything past ±80° is far outside the viewport — hide it
            // (also stops cards from reappearing behind the viewer).
            if (Math.abs(phi) > 80) {
              card.style.visibility = "hidden";
              return;
            }
            card.style.visibility = "visible";
            // translateZ(R) rotateY(phi) translateZ(-R): rotate around
            // the cylinder's axis, with the wall's nearest point kept
            // at z=0 so the center card renders at its CSS size.
            card.style.transform = `translateX(-50%) translateZ(${R.toFixed(1)}px) rotateY(${phi.toFixed(3)}deg) translateZ(${(-R).toFixed(1)}px)`;
          });
        };

        const step = (now) => {
          const dt = Math.min((now - lastT) / 1000, 0.05);
          lastT = now;
          speed += (targetSpeed - speed) * 0.08;
          base = (base + speed * dt) % 360;
          layout();
          requestAnimationFrame(step);
        };

        size();
        window.addEventListener("resize", () => {
          size();
          if (reducedMotion) layout();
        });

        if (reducedMotion) {
          // Static cylinder, no drift.
          layout();
        } else {
          // Ease down to a crawl while hovered so cards are easy to click.
          heroCarousel.addEventListener("mouseenter", () => {
            hovered = true;
            targetSpeed = cruiseSpeed * 0.2;
          });
          heroCarousel.addEventListener("mouseleave", () => {
            hovered = false;
            targetSpeed = cruiseSpeed;
          });
          requestAnimationFrame((t0) => {
            lastT = t0;
            requestAnimationFrame(step);
          });
        }
      }

      // ---- "What I do" rows -----------------------------------------
      // One row per PORTFOLIO.services pillar. Skill-category chips
      // reveal their items on click (stopPropagation so the row's own
      // click — jump to the grid with that niche filter applied —
      // doesn't fire at the same time).
      const escAttr = (s) => (s || "").replace(/"/g, "&quot;");
      const itemsByCategory = {};
      PORTFOLIO.skills.forEach((s) => (itemsByCategory[s.category] = s.items));
      const widList = document.getElementById("wid-list");
      if (widList) {
        widList.innerHTML = (PORTFOLIO.services || [])
          .map(
            (sv, i) => `<div class="wid-row" data-niche="${sv.niche || ""}" role="link" tabindex="0" aria-label="See ${escAttr(sv.title)} projects">
              <span class="wid-num">0${i + 1}</span>
              <h3 class="wid-title">${sv.title}</h3>
              <div class="wid-detail">
                <p class="wid-body">${sv.body}</p>
                <div class="service-skills">
                  ${(sv.skills || [])
                    .map(
                      (cat) =>
                        `<button type="button" class="skill-chip" data-items="${escAttr(itemsByCategory[cat])}">${cat}</button>`
                    )
                    .join("")}
                </div>
                <div class="skill-reveal" hidden></div>
              </div>
              <span class="wid-arrow" aria-hidden="true">→</span>
            </div>`
          )
          .join("");

        widList.querySelectorAll(".wid-row").forEach((row) => {
          const reveal = row.querySelector(".skill-reveal");
          row.querySelectorAll(".skill-chip").forEach((chip) => {
            chip.addEventListener("click", (e) => {
              e.stopPropagation();
              const wasActive = chip.classList.contains("active");
              row.querySelectorAll(".skill-chip").forEach((c) => c.classList.remove("active"));
              if (wasActive) {
                reveal.hidden = true;
                reveal.textContent = "";
              } else {
                chip.classList.add("active");
                reveal.textContent = chip.dataset.items;
                reveal.hidden = false;
              }
            });
          });
          // Row click → apply this niche's filter and scroll to the grid.
          const go = () => {
            const btn = document.querySelector(`.niche-btn[data-niche="${row.dataset.niche}"]`);
            if (btn && !btn.classList.contains("active")) btn.click();
            const bar = document.querySelector(".niche-bar-wrap");
            if (bar) bar.scrollIntoView({ behavior: "smooth", block: "start" });
          };
          row.addEventListener("click", go);
          row.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              e.preventDefault();
              go();
            }
          });
        });
      }

      document.getElementById("projects-grid").innerHTML = PORTFOLIO.projects
        .map((p) => {
          // If a project has a `video`, the card plays a silent looping
          // preview instead of the static gradient/image. The video sits
          // inside .project-cover (not as .project-cover itself) so the
          // hover-darken overlay still works — ::after doesn't reliably
          // render on <video> elements directly.
          //
          // The video is LAZY-LOADED: no `src`/`autoplay` up front — just
          // `data-src` and preload="none" — so the browser doesn't pull
          // every clip on page load (brutal on mobile). An
          // IntersectionObserver below sets the src + plays only when the
          // tile nears the viewport, and pauses it when it leaves. The
          // cover's background-image/gradient shows as a poster until the
          // video kicks in, so there's always something on screen.
          const bg = p.cover ? `background-image:${p.cover}` : "";
          // No `cover` and no `video` -> auto-generated placeholder card
          // (theme.js renderPlaceholderCover) instead of a real image.
          const cover = p.video
            ? `<div class="project-cover size-${p.size || "square"}" style="${bg}"><video class="cover-media" data-src="${p.video}" muted loop playsinline preload="none"></video></div>`
            : p.cover
            ? `<div class="project-cover size-${p.size || "square"}" style="${bg}"></div>`
            : `<div class="project-cover size-${p.size || "square"}">${renderPlaceholderCover()}</div>`;
          return `<a class="project-card" href="${p.page}" data-project-id="${p.id}" data-niche="${p.niche || ""}">
            ${cover}
            <div class="project-meta">
              <div class="project-title-row">
                <p class="project-title">${p.title}</p>
                ${p.badge ? `<span class="project-badge">${p.badge}</span>` : ""}
              </div>
              <p class="project-tag">${p.tag}</p>
            </div>
          </a>`;
        })
        .join("");

      // When a tile with a video is clicked, remember exactly where its
      // preview was in playback so the hero on the project page can pick
      // up from the same point instead of restarting at 0:00.
      document.querySelectorAll(".project-card").forEach((card) => {
        const video = card.querySelector(".cover-media");
        if (!video) return;
        card.addEventListener("click", () => {
          sessionStorage.setItem(`resumeTime:${card.dataset.projectId}`, String(video.currentTime || 0));
        });
      });

      // Lazy-load the preview videos: only attach the src + play once a
      // tile is near the viewport, and pause it when it scrolls away.
      // This means a phone loads one or two clips at a time as you
      // scroll, instead of hammering the network with all of them on
      // page load. `rootMargin` starts the load ~300px early so the clip
      // is usually ready by the time the tile is actually on screen.
      const videos = document.querySelectorAll(".cover-media");
      if (videos.length) {
        const videoObserver = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              const v = entry.target;
              if (entry.isIntersecting) {
                if (!v.src && v.dataset.src) v.src = v.dataset.src;
                v.play().catch(() => {});
              } else {
                v.pause();
              }
            });
          },
          { rootMargin: "300px 0px" }
        );
        videos.forEach((v) => videoObserver.observe(v));
      }

      // Staggered scroll-reveal: each tile fades/slides in as it enters
      // the viewport, with a small per-card delay (capped + cycled so a
      // long grid doesn't end up with a multi-second tail).
      const cards = document.querySelectorAll(".project-card");
      cards.forEach((card, i) => {
        card.classList.add("reveal");
        card.style.transitionDelay = `${(i % 6) * 60}ms`;
      });
      const revealObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              revealObserver.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.15, rootMargin: "0px 0px -40px 0px" }
      );
      cards.forEach((card) => revealObserver.observe(card));

      // Pack the varied-height tiles into the row-major masonry.
      // Defined in js/theme.js; called here because the cards above
      // were just built and don't exist during theme.js's own init.
      if (typeof initProjectMasonry === "function") initProjectMasonry();

      // ---- Niche filter bar --------------------------------------
      // Centered segmented pill above the grid. A sliding "thumb"
      // glides behind the active segment; picking one hides the
      // non-matching tiles, re-packs the masonry, and replays the
      // staggered reveal on the survivors.
      const NICHE_ICONS = {
        all: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="3.5" width="7" height="7" rx="1.5"/><rect x="3.5" y="13.5" width="7" height="7" rx="1.5"/><rect x="13.5" y="13.5" width="7" height="7" rx="1.5"/></svg>',
        web: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4.5" width="18" height="15" rx="2"/><path d="M3 9.5h18"/></svg>',
        funnels: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M4 4.5h16l-6 7.5v6.5l-4 1.5v-8L4 4.5z"/></svg>',
        automation: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M13 2.5 4.5 13.5H11l-1 8 8.5-11H12l1-8z"/></svg>',
        security: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 3l7 2.8V11c0 4.8-3.4 8.3-7 9.7C8.4 19.3 5 15.8 5 11V5.8L12 3z"/></svg>',
        design: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12.5 18.5 19 12l-4-4-6.5 6.5L7 19l5.5-.5z"/><path d="M14.5 8.5 16 7l4 4-1.5 1.5"/></svg>',
        posters: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><rect x="3.5" y="3.5" width="17" height="17" rx="2"/><circle cx="9" cy="9.5" r="1.6"/><path d="M3.5 17l4.5-4.5 3.5 3.5 4-4 5 5"/></svg>',
      };
      const nicheBar = document.getElementById("niche-bar");
      const nicheThumb = document.getElementById("niche-thumb");
      const postersGrid = document.getElementById("posters-grid");
      // POSTERS (js/posters.js, auto-generated) is a list of categories:
      // { dir, label, files } — one section per subfolder of assets/posters/.
      const posterCats = typeof POSTERS !== "undefined" && Array.isArray(POSTERS) ? POSTERS : [];
      const posterCount = posterCats.reduce((n, c) => n + c.files.length, 0);
      if (nicheBar && nicheThumb && Array.isArray(PORTFOLIO.niches)) {
        const counts = { all: PORTFOLIO.projects.length, posters: posterCount };
        PORTFOLIO.projects.forEach((p) => { counts[p.niche] = (counts[p.niche] || 0) + 1; });
        // "All" deliberately excludes the poster wall — 100+ posters would
        // drown the case studies, so they live only on their own tab.
        const segments = [{ id: "all", label: "All" }, ...PORTFOLIO.niches];
        if (posterCount) segments.push({ id: "posters", label: "E-Commerce Posters" });
        nicheBar.insertAdjacentHTML(
          "beforeend",
          segments
            .map(
              (n) => `<button type="button" class="niche-btn${n.id === "all" ? " active" : ""}" data-niche="${n.id}" role="tab" aria-selected="${n.id === "all"}">
                <span class="niche-icon">${NICHE_ICONS[n.id] || ""}</span>
                <span class="niche-label">${n.label}</span>
                <span class="niche-count">${counts[n.id] || 0}</span>
              </button>`
            )
            .join("")
        );

        const moveNicheThumb = (btn) => {
          nicheThumb.style.width = btn.offsetWidth + "px";
          nicheThumb.style.transform = `translateX(${btn.offsetLeft}px)`;
        };

        const applyNicheFilter = (niche) => {
          // The posters tab swaps the project grid out for the poster
          // wall (built lazily on first open so 103 images don't load
          // unless someone actually asks for them).
          const showPosters = niche === "posters";
          if (postersGrid) {
            if (showPosters && !postersGrid.childElementCount) {
              // One titled section per category (subfolder), newest first.
              postersGrid.innerHTML = posterCats
                .map(
                  (c) => `<div class="poster-cat">
                    <div class="section-label">${c.label} <span class="section-num">[${c.files.length}]</span></div>
                    <div class="poster-wall">${c.files
                      .map((f) => {
                        const folder = c.dir ? encodeURIComponent(c.dir) + "/" : "";
                        const file = encodeURIComponent(f);
                        return `<img class="poster-item" loading="lazy" decoding="async" src="assets/posters/${folder}${file}" alt="${c.label} — poster design" />`;
                      })
                      .join("")}</div>
                  </div>`
                )
                .join("");
            }
            postersGrid.hidden = !showPosters;
          }
          let shown = 0;
          document.querySelectorAll(".project-card").forEach((card) => {
            const wasHidden = card.classList.contains("filtered-out");
            const show = !showPosters && (niche === "all" || card.dataset.niche === niche);
            card.classList.toggle("filtered-out", !show);
            // Only replay the reveal on cards that were actually hidden —
            // cards already on screen stay put (no full-grid "flash").
            if (show && wasHidden) {
              card.classList.remove("is-visible");
              card.style.transitionDelay = `${(shown % 6) * 60}ms`;
              shown += 1;
            }
          });
          if (typeof initProjectMasonry === "function") initProjectMasonry();
          // Force a style flush between removing and re-adding .is-visible
          // so the reveal transition replays (rAF can be throttled in
          // background tabs, so a synchronous reflow is more reliable).
          void document.body.offsetHeight;
          document.querySelectorAll(".project-card:not(.filtered-out)").forEach((c) => c.classList.add("is-visible"));
        };

        nicheBar.addEventListener("click", (e) => {
          const btn = e.target.closest(".niche-btn");
          if (!btn || btn.classList.contains("active")) return;
          nicheBar.querySelectorAll(".niche-btn").forEach((b) => {
            b.classList.remove("active");
            b.setAttribute("aria-selected", "false");
          });
          btn.classList.add("active");
          btn.setAttribute("aria-selected", "true");
          moveNicheThumb(btn);
          applyNicheFilter(btn.dataset.niche);
        });

        // Position the thumb under "All" now, and again once fonts have
        // loaded (metrics shift) and on resize.
        const syncThumb = () => {
          const active = nicheBar.querySelector(".niche-btn.active");
          if (active) moveNicheThumb(active);
        };
        syncThumb();
        window.addEventListener("load", syncThumb);
        window.addEventListener("resize", syncThumb);

        // Mobile: fade + chevron on the pill's right edge while more
        // segments are hidden off-screen; disappears at scroll end.
        const barWrap = nicheBar.parentElement;
        const updateBarFade = () => {
          barWrap.classList.toggle("scrollable", nicheBar.scrollWidth > nicheBar.clientWidth + 6);
          barWrap.classList.toggle("scroll-end", nicheBar.scrollLeft + nicheBar.clientWidth >= nicheBar.scrollWidth - 6);
        };
        nicheBar.addEventListener("scroll", updateBarFade, { passive: true });
        window.addEventListener("resize", updateBarFade);
        window.addEventListener("load", updateBarFade);
        updateBarFade();
      }

      // Testimonials — real client reviews (verbatim, from Upwork).
      const testimonialsGrid = document.getElementById("testimonials-grid");
      const testimonialsSection = document.getElementById("testimonials-section");
      if (testimonialsGrid && Array.isArray(PORTFOLIO.testimonials) && PORTFOLIO.testimonials.length) {
        testimonialsGrid.innerHTML = PORTFOLIO.testimonials
          .map(
            (t) => `<figure class="testimonial-card">
              <blockquote class="testimonial-quote">${t.quote}</blockquote>
              <figcaption class="testimonial-attribution">
                <span class="testimonial-name">${t.name}</span>
                <span class="testimonial-role">${t.role}</span>
              </figcaption>
            </figure>`
          )
          .join("");
      } else if (testimonialsSection) {
        testimonialsSection.remove();
      }
    });
  </script>
</body>
</html>
