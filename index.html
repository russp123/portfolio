<title>Russel A. Pineda — Full-Stack Developer</title>
<script>
  // Runs synchronously, before anything paints — sets the theme
  // attribute immediately so the browser never has a chance to paint
  // CSS's dark :root defaults first. Without this, a saved "light"
  // preference would flash dark for a frame on every load (theme.js,
  // which runs later, would be too late to prevent that).
  document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "light");
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/lenis@1.3.25/dist/lenis.css" />
<link rel="stylesheet" href="css/style.css" />
<link rel="icon" href="assets/portfolio-logo.jpg" />
</head>
<body>

  <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark"><span id="theme-icon">☾</span></button>

  <button class="russellm-toggle" id="russellm-toggle" title="Chat with RUSSELLM">RUSSELLM</button>
  <div class="russellm-overlay" id="russellm-overlay"></div>
  <aside class="russellm-drawer" id="russellm-drawer" aria-hidden="true">
    <div class="russellm-drawer-header">
      <span class="russellm-drawer-title">RUSSELLM</span>
      <button class="russellm-close" id="russellm-close" title="Close">×</button>
    </div>
    <div class="russellm-log" id="russellm-log"></div>
    <form class="russellm-input-row" id="russellm-form">
      <input type="text" id="russellm-input" placeholder="Ask a question…" autocomplete="off" maxlength="500" />
      <button type="submit" class="russellm-send" id="russellm-send">Send</button>
    </form>
  </aside>

  <div class="wrap">

    <header class="site-header">
      <div class="col-start">
        <a href="/"><p class="header-name" id="header-name">Russel A. Pineda</p></a>
      </div>
      <div class="col-mid"><span class="header-meta-item" id="header-title">Full-Stack Developer</span></div>
      <div class="col-end"><span class="header-meta-item" id="header-location"></span></div>
    </header>

    <main>
      <div class="top-grid">
        <section class="about-row">
          <div class="avatar-widget" id="avatar-widget" role="button" tabindex="0" aria-label="Click for a surprise">
            <span class="avatar-word" id="avatar-word"></span>
            <img class="avatar-img" id="avatar-img" src="assets/avatar-neutral.png" alt="Click for a surprise" />
            <span class="avatar-hint">Click me!</span>
          </div>
          <div class="about-row-text">
            <div class="section-label">About <span class="section-num">[1]</span></div>
            <div class="about-text" id="about-text"></div>
          </div>
        </section>

        <!-- "What I do" — service pillars, each with its skill categories
             as chips that reveal the tech on click. Content from
             PORTFOLIO.services + PORTFOLIO.skills; rendered below. -->
        <section>
          <div class="section-label">What I do <span class="section-num">[2]</span></div>
          <div class="services-list" id="services-list"></div>
          <a class="exp-cue" href="/about">Experience <span aria-hidden="true">→</span></a>
        </section>
      </div>

      <section class="projects-grid" id="projects-grid"></section>

      <section class="testimonials" id="testimonials-section">
        <div class="section-label">What clients say</div>
        <div class="testimonials-grid" id="testimonials-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <a class="cv-button" id="footer-cv" href="#" target="_blank" rel="noopener"></a>
      <div class="footer-links" id="footer-links"></div>
      <div>
        <p class="footer-cta" id="footer-cta"></p>
        <a class="footer-email" id="footer-email" href="#"></a>
      </div>
    </footer>

  </div>

  <script src="https://unpkg.com/lenis@1.3.25/dist/lenis.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/russellm.js"></script>
  <script src="js/avatar.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("about-text").innerHTML = `<p>${PORTFOLIO.aboutHtml}</p>`;

      // "What I do" pillars: title + description + the pillar's skill
      // categories as chips. Clicking a chip reveals that category's items
      // (from PORTFOLIO.skills) below the chip row — one open per pillar.
      const escAttr = (s) => (s || "").replace(/"/g, "&quot;");
      const itemsByCategory = {};
      PORTFOLIO.skills.forEach((s) => (itemsByCategory[s.category] = s.items));
      document.getElementById("services-list").innerHTML = (PORTFOLIO.services || [])
        .map(
          (sv) => `<div class="service">
            <h3 class="service-title">${sv.title}</h3>
            <p class="service-body">${sv.body}</p>
            <div class="service-skills">
              ${(sv.skills || [])
                .map(
                  (cat) =>
                    `<button type="button" class="skill-chip" data-items="${escAttr(itemsByCategory[cat])}">${cat}</button>`
                )
                .join("")}
            </div>
            <div class="skill-reveal" hidden></div>
          </div>`
        )
        .join("");

      document.querySelectorAll("#services-list .service").forEach((pillar) => {
        const reveal = pillar.querySelector(".skill-reveal");
        pillar.querySelectorAll(".skill-chip").forEach((chip) => {
          chip.addEventListener("click", () => {
            const wasActive = chip.classList.contains("active");
            pillar.querySelectorAll(".skill-chip").forEach((c) => c.classList.remove("active"));
            if (wasActive) {
              reveal.hidden = true;
              reveal.textContent = "";
            } else {
              chip.classList.add("active");
              reveal.textContent = chip.dataset.items;
              reveal.hidden = false;
            }
          });
        });
      });

      document.getElementById("projects-grid").innerHTML = PORTFOLIO.projects
        .map((p) => {
          // If a project has a `video`, the card plays a silent looping
          // preview instead of the static gradient/image. The video sits
          // inside .project-cover (not as .project-cover itself) so the
          // hover-darken overlay still works — ::after doesn't reliably
          // render on <video> elements directly.
          //
          // The video is LAZY-LOADED: no `src`/`autoplay` up front — just
          // `data-src` and preload="none" — so the browser doesn't pull
          // every clip on page load (brutal on mobile). An
          // IntersectionObserver below sets the src + plays only when the
          // tile nears the viewport, and pauses it when it leaves. The
          // cover's background-image/gradient shows as a poster until the
          // video kicks in, so there's always something on screen.
          const bg = p.cover ? `background-image:${p.cover}` : "";
          const cover = p.video
            ? `<div class="project-cover size-${p.size || "square"}" style="${bg}"><video class="cover-media" data-src="${p.video}" muted loop playsinline preload="none"></video></div>`
            : `<div class="project-cover size-${p.size || "square"}" style="${bg}"></div>`;
          return `<a class="project-card" href="${p.page}" data-project-id="${p.id}">
            ${cover}
            <div class="project-meta">
              <div class="project-title-row">
                <p class="project-title">${p.title}</p>
                ${p.badge ? `<span class="project-badge">${p.badge}</span>` : ""}
              </div>
              <p class="project-tag">${p.tag}</p>
            </div>
          </a>`;
        })
        .join("");

      // When a tile with a video is clicked, remember exactly where its
      // preview was in playback so the hero on the project page can pick
      // up from the same point instead of restarting at 0:00.
      document.querySelectorAll(".project-card").forEach((card) => {
        const video = card.querySelector(".cover-media");
        if (!video) return;
        card.addEventListener("click", () => {
          sessionStorage.setItem(`resumeTime:${card.dataset.projectId}`, String(video.currentTime || 0));
        });
      });

      // Lazy-load the preview videos: only attach the src + play once a
      // tile is near the viewport, and pause it when it scrolls away.
      // This means a phone loads one or two clips at a time as you
      // scroll, instead of hammering the network with all of them on
      // page load. `rootMargin` starts the load ~300px early so the clip
      // is usually ready by the time the tile is actually on screen.
      const videos = document.querySelectorAll(".cover-media");
      if (videos.length) {
        const videoObserver = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              const v = entry.target;
              if (entry.isIntersecting) {
                if (!v.src && v.dataset.src) v.src = v.dataset.src;
                v.play().catch(() => {});
              } else {
                v.pause();
              }
            });
          },
          { rootMargin: "300px 0px" }
        );
        videos.forEach((v) => videoObserver.observe(v));
      }

      // Staggered scroll-reveal: each tile fades/slides in as it enters
      // the viewport, with a small per-card delay (capped + cycled so a
      // long grid doesn't end up with a multi-second tail).
      const cards = document.querySelectorAll(".project-card");
      cards.forEach((card, i) => {
        card.classList.add("reveal");
        card.style.transitionDelay = `${(i % 6) * 60}ms`;
      });
      const revealObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              revealObserver.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.15, rootMargin: "0px 0px -40px 0px" }
      );
      cards.forEach((card) => revealObserver.observe(card));

      // Pack the varied-height tiles into the row-major masonry.
      // Defined in js/theme.js; called here because the cards above
      // were just built and don't exist during theme.js's own init.
      if (typeof initProjectMasonry === "function") initProjectMasonry();

      // Testimonials — real client reviews (verbatim, from Upwork).
      const testimonialsGrid = document.getElementById("testimonials-grid");
      const testimonialsSection = document.getElementById("testimonials-section");
      if (testimonialsGrid && Array.isArray(PORTFOLIO.testimonials) && PORTFOLIO.testimonials.length) {
        testimonialsGrid.innerHTML = PORTFOLIO.testimonials
          .map(
            (t) => `<figure class="testimonial-card">
              <blockquote class="testimonial-quote">${t.quote}</blockquote>
              <figcaption class="testimonial-attribution">
                <span class="testimonial-name">${t.name}</span>
                <span class="testimonial-role">${t.role}</span>
              </figcaption>
            </figure>`
          )
          .join("");
      } else if (testimonialsSection) {
        testimonialsSection.remove();
      }
    });
  </script>
</body>
</html>
